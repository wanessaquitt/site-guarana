<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Consolidated Page</title>
    <style>
        .tabs {
            display: flex;
            cursor: pointer;
        }
        .tab {
            flex: 1;
            padding: 10px;
            background: #f1f1f1;
            text-align: center;
        }
        .tab.active {
            background: #ccc;
        }
        .content {
            display: none;
            padding: 20px;
        }
        .content.active {
            display: block;
        }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" onclick="showContent('produtiva')">Produtiva</div>
        <div class="tab" onclick="showContent('suprimentos')">Suprimentos</div>
        <div class="tab" onclick="showContent('valor')">Valor</div>
    </div>

    <div id="produtiva" class="content active">
        <h2>Produtiva</h2>
        <p>Full content from the produtiva page goes here.</p>
    </div>

    <div id="suprimentos" class="content">
        <h2>Suprimentos</h2>
        <p>Full content from the suprimentos page goes here.</p>
    </div>

    <div id="valor" class="content">
        <h2>Valor</h2>
        <p>Full content from the valor page goes here.</p>
    </div>

    <script>
        function showContent(tab) {
            const contents = document.querySelectorAll('.content');
            const tabs = document.querySelectorAll('.tab');
            contents.forEach(content => content.classList.remove('active'));
            tabs.forEach(tabItem => tabItem.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            document.querySelector(`.tab[onclick*="${tab}"]`).classList.add('active');
        }
    </script>

</body>
</html>
